# =============================================================================
# XFAPI configuration — split mode, L2 side
# =============================================================================
# See docs/BUILD_AND_RUN.md for prerequisites and startup order.

# =============================================================================
# DPDK configuration
# =============================================================================
dpdk_config:
  dpdk_iova_mode: 0
  dpdk_memory_zone: "gnb0_l2"  # XFAPI-L2 is DPDK PRIMARY on this host.

  # Ignored in OCUDU_OCUDU mode; left here for YAML schema compatibility.
  dpdk_device_1: "0000:00:00.0"
  dpdk_device_2: "0000:00:00.0"

# =============================================================================
# xSM endpoint toward OCUDU-L1 — IGNORED in split mode
# =============================================================================
# Kept for YAML schema compatibility.
ocudu_xsm_l1:
  device_name: "xsm_bridge"
  memory_size: 2346713088
  queue_capacity: 1024
  return_queue_capacity: 1024

# =============================================================================
# xSM endpoint toward OCUDU-L2 (pair 1)
# =============================================================================
# In split mode this is the only local memzone-xSM handle.
ocudu_xsm_l2:
  device_name: "xsm_bridge"
  memory_size: 2346713088
  queue_capacity: 1024
  return_queue_capacity: 1024

# =============================================================================
# Forwarder thread settings
# =============================================================================
ocudu_forwarder:
  l1_to_l2_core_id: 3        # local->network forwarder pin
  l2_to_l1_core_id: 5        # network->local forwarder pin
  priority: 85
  sched_policy: "SCHED_FIFO"

# =============================================================================
# Split mode — THIS server is the L2 side
# =============================================================================
split:
  role: L2
  local_pci: "0000:00:00.0"        # set to THIS host's NIC PCI BDF
  peer_mac:  "00:00:00:00:00:00"   # set to PEER host's NIC MAC address
  mtu: 8192
  rx_lcore_id: 7
  local_memzone_name: "xsm_eth_local"
  local_memzone_size: 268435456    # 256 MiB

# =============================================================================
# Logging
# =============================================================================
logging:
  vertical_level: "INFO"
  horizontal_level:
    xFAPI_log: true
    xSM_log: true
    P5_log: false
    P7_log: false
  print_config: true
  print_datetime: true
