app_name: "xfapi_main"

# AERIAL_OAI: Aerial L1 (SCF FAPI over nvIPC) <-> OAI L2 (classic nFAPI).
# xFAPI is the nvIPC SECONDARY toward Aerial and the nFAPI PNF (server) toward
# OAI-L2 (OAI-MAC connects in as the VNF). No DPDK, no xSM in this mode.

logging:
  vertical_level: "DEBUG"
  horizontal_level:
    xFAPI_log: true
    xSM_log: false
    P5_log: true
    P7_log: true
  print_config: false
  print_datetime: true

log_file:
  generate_log_file: false

# nvIPC toward Aerial cuphycontroller (PRIMARY). Prefix must match Aerial's
# nvipc shm_config.prefix.
nvipc:
  prefix: "nvipc"
  blocking: false

# nFAPI sockets toward OAI-L2 (MAC). OAI's nFAPI VNF is the SCTP SERVER, so
# xFAPI (PNF) CONNECTS OUT to it: SCTP to remote_ip:p5_remote_port (bound to
# local_ip:p5_local_port). P7 is UDP: bind p7_local_port, send to
# remote_ip:p7_remote_port.
#
# Mapping to the OAI VNF conf (MACRLCs):
#   p5_remote_port = OAI local_s_portc   (VNF P5 listen)
#   p5_local_port  = OAI remote_s_portc  (PNF P5 source)
#   p7_local_port  = OAI remote_s_portd  (OAI sends here)
#   p7_remote_port = OAI local_s_portd   (OAI receives here)
#   remote_ip      = OAI local_s_address (VNF)
#   local_ip       = OAI remote_s_address (PNF/this host)
nfapi_socket:
  remote_ip: "192.168.1.127"
  local_ip: "192.168.1.129"
  p5_remote_port: 50001
  p5_local_port: 50000
  p7_local_port: 50010
  p7_remote_port: 50011
  enable_checksum: true

forwarder:
  recv_core_id: 17
  send_core_id: 18
  priority: 85
  sched_policy: "SCHED_FIFO"
